<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ayarlar</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="sayfa">
  <header class="izleme-header" style="background:#1e293b;">
    <a href="/" class="geri">←</a>
    <h1>🛠️ Ayarlar</h1>
    <span style="width:40px"></span>
  </header>

  <main class="form">
    <section class="grup">
      <label class="grup-baslik">Minimum Büyüklük</label>
      <div class="slider-row">
        <input type="range" id="min-buyukluk" min="1.0" max="7.0" step="0.1" value="2.0" />
        <span id="min-deger" class="rozet">2.0</span>
      </div>
      <small class="ipucu">Bu eşik <b>Özel İzleme</b> sayfasında kullanılır.</small>
    </section>

    <section class="grup">
      <label class="grup-baslik">Konum Filtresi</label>
      <label class="satir">
        <input type="checkbox" id="konum-aktif" />
        <span>Sadece konumumun yakınındaki depremler</span>
      </label>
      <div class="slider-row" id="yaricap-row" style="display:none;">
        <input type="range" id="yaricap" min="50" max="2000" step="50" value="500" />
        <span id="yaricap-deger" class="rozet">500 km</span>
      </div>
      <button id="konum-al" class="btn">📍 Konumumu Al</button>
      <small id="konum-bilgi" class="ipucu"></small>
    </section>

    <section class="grup">
      <label class="grup-baslik">Sesli Anons</label>
      <label class="satir">
        <span>Konuşma hızı</span>
        <select id="ses-hiz">
          <option value="0.5">0.5× — Çok Yavaş</option>
          <option value="0.75">0.75× — Yavaş</option>
          <option value="1.0" selected>1.0× — Normal</option>
          <option value="1.25">1.25× — Hızlı</option>
          <option value="1.5">1.5× — Çok Hızlı</option>
        </select>
      </label>
      <label class="satir">
        <span>Ses seviyesi</span>
        <select id="ses-seviyesi">
          <option value="0.3">Düşük (%30)</option>
          <option value="0.5">Orta (%50)</option>
          <option value="0.75">Yüksek (%75)</option>
          <option value="1.0" selected>Maks (%100)</option>
        </select>
      </label>
      <label class="satir">
        <span>Ses seçimi</span>
        <select id="ses-secim"><option value="">(otomatik tr-TR)</option></select>
      </label>
    </section>

    <section class="grup test-paneli">
      <label class="grup-baslik">🧪 Test Alanı</label>
      <small class="ipucu">Sesi, bip ve titreşimi burada deneyebilirsin.</small>

      <div class="test-buton-grid">
        <button id="test-ses" class="btn">🔊 Örnek Anonsu Oku</button>
        <button id="test-bip" class="btn">🔔 Sadece Bip</button>
        <button id="test-titres" class="btn">📳 Titreşim</button>
        <button id="test-tam" class="btn vurgu">🚨 Tam Simülasyon</button>
      </div>

      <label class="grup-baslik" style="margin-top:14px;">Özel mesaj dene</label>
      <textarea id="test-mesaj" rows="3" placeholder="Buraya yazdığın metni okur..."
        style="width:100%;padding:8px;border-radius:8px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;">Bu bir test mesajıdır. Sistem çalışıyor.</textarea>
      <button id="test-ozel" class="btn" style="margin-top:8px;">▶ Yazdığım Metni Oku</button>

      <label class="grup-baslik" style="margin-top:14px;">Gerçek deprem ile test</label>
      <button id="test-gercek" class="btn">📡 En Son Depremi Çek ve Oku</button>
      <small id="test-durum" class="ipucu" style="display:block;margin-top:6px;min-height:16px;"></small>
    </section>

    <section class="grup">
      <a href="/ozel" class="btn buyuk">Bu ayarlarla Özel İzlemeyi Aç →</a>
    </section>

    <section class="grup">
      <button id="sifirla" class="btn tehlike">Tüm Ayarları Sıfırla</button>
    </section>
  </main>

  <script src="/static/ayarlar.js"></script>
</body>
</html>
