<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harita</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body class="harita-body">
  <header class="izleme-header" style="background:#1e293b;">
    <a href="/" class="geri">←</a>
    <h1>🗺️ Harita</h1>
    <select id="harita-min" class="ses-btn" style="width:auto; padding:0 10px; border-radius:8px;">
      <option value="0">Tümü</option>
      <option value="1">M1+</option>
      <option value="2" selected>M2+</option>
      <option value="3">M3+</option>
    </select>
  </header>

  <div id="harita"></div>

  <div class="harita-bilgi">
    <span id="harita-durum">Yükleniyor…</span>
    <span class="legend">
      <span class="lej yesil"></span>1-2
      <span class="lej sari"></span>2-3
      <span class="lej turuncu"></span>3-4
      <span class="lej kirmizi"></span>4+
    </span>
  </div>

  <script src="/static/harita.js"></script>
</body>
</html>
